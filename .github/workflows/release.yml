name: Build and Publish Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag to publish (example: v1.3.0)"
        required: true
        type: string
      publish_target:
        description: "Where to publish the release artifacts"
        required: true
        default: github
        type: choice
        options:
          - github
          - s3
          - both
          - none
      mac_arch:
        description: "macOS architectures to build"
        required: true
        default: both
        type: choice
        options:
          - both
          - arm64
          - x64

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22.22.1"

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      version: ${{ steps.meta.outputs.version }}
      publish_target: ${{ steps.meta.outputs.publish_target }}
      publish_to_github: ${{ steps.meta.outputs.publish_to_github }}
      publish_to_s3: ${{ steps.meta.outputs.publish_to_s3 }}
      mac_arch_matrix: ${{ steps.meta.outputs.mac_arch_matrix }}
      mac_signing_enabled: ${{ steps.meta.outputs.mac_signing_enabled }}
      mac_notarization_enabled: ${{ steps.meta.outputs.mac_notarization_enabled }}
      s3_prefix: ${{ steps.meta.outputs.s3_prefix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve release metadata
        id: meta
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG_INPUT: ${{ github.event.inputs.release_tag }}
          PUBLISH_TARGET_INPUT: ${{ github.event.inputs.publish_target }}
          MAC_ARCH_INPUT: ${{ github.event.inputs.mac_arch }}
          MAC_CERTIFICATE_P12: ${{ secrets.MAC_CERTIFICATE_P12 }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          MAC_CODESIGN_IDENTITY: ${{ secrets.MAC_CODESIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          RELEASE_S3_BUCKET: ${{ vars.RELEASE_S3_BUCKET }}
          RELEASE_S3_PREFIX: ${{ vars.RELEASE_S3_PREFIX }}
          AWS_ROLE_TO_ASSUME: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            RELEASE_TAG="$RELEASE_TAG_INPUT"
            PUBLISH_TARGET="${PUBLISH_TARGET_INPUT:-github}"
            MAC_ARCH="${MAC_ARCH_INPUT:-both}"
          else
            RELEASE_TAG="${GITHUB_REF_NAME}"
            PUBLISH_TARGET="github"
            MAC_ARCH="both"
          fi

          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+(\.[0-9]+){2}([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::Release tag must look like v1.2.3 or v1.2.3-rc.1. Received: $RELEASE_TAG"
            exit 1
          fi

          case "$PUBLISH_TARGET" in
            github|s3|both|none) ;;
            *)
              echo "::error::Unsupported publish target: $PUBLISH_TARGET"
              exit 1
              ;;
          esac

          case "$MAC_ARCH" in
            both) MAC_ARCH_MATRIX='["arm64","x64"]' ;;
            arm64|x64) MAC_ARCH_MATRIX="[\"$MAC_ARCH\"]" ;;
            *)
              echo "::error::Unsupported macOS architecture selection: $MAC_ARCH"
              exit 1
              ;;
          esac

          VERSION="${RELEASE_TAG#v}"
          PACKAGE_VERSION="$(python3 - <<'PY'
          import json
          from pathlib import Path
          print(json.loads(Path("package.json").read_text())["version"])
          PY
          )"

          if [[ "$PACKAGE_VERSION" != "$VERSION" ]]; then
            echo "::error::package.json version ($PACKAGE_VERSION) does not match release tag ($VERSION)"
            exit 1
          fi

          MAC_SIGNING_ENABLED=false
          if [[ -n "$MAC_CERTIFICATE_P12" && -n "$MAC_CERTIFICATE_PASSWORD" && -n "$MAC_CODESIGN_IDENTITY" ]]; then
            MAC_SIGNING_ENABLED=true
          fi

          MAC_NOTARIZATION_ENABLED=false
          if [[ "$MAC_SIGNING_ENABLED" == "true" && -n "$APPLE_ID" && -n "$APPLE_TEAM_ID" && -n "$APPLE_APP_SPECIFIC_PASSWORD" ]]; then
            MAC_NOTARIZATION_ENABLED=true
          fi

          S3_CONFIGURED=false
          if [[ -n "$RELEASE_S3_BUCKET" ]] && ([[ -n "$AWS_ROLE_TO_ASSUME" ]] || [[ -n "$AWS_ACCESS_KEY_ID" && -n "$AWS_SECRET_ACCESS_KEY" ]]); then
            S3_CONFIGURED=true
          fi

          if [[ "$PUBLISH_TARGET" == "s3" || "$PUBLISH_TARGET" == "both" ]] && [[ "$S3_CONFIGURED" != "true" ]]; then
            echo "::error::S3 publishing was requested, but RELEASE_S3_BUCKET or AWS credentials are missing."
            exit 1
          fi

          PUBLISH_TO_GITHUB=false
          if [[ "$PUBLISH_TARGET" == "github" || "$PUBLISH_TARGET" == "both" ]]; then
            PUBLISH_TO_GITHUB=true
          fi

          PUBLISH_TO_S3=false
          if [[ "$PUBLISH_TARGET" == "s3" || "$PUBLISH_TARGET" == "both" ]]; then
            PUBLISH_TO_S3=true
          fi

          NORMALIZED_S3_PREFIX="${RELEASE_S3_PREFIX#/}"
          NORMALIZED_S3_PREFIX="${NORMALIZED_S3_PREFIX%/}"

          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "publish_target=$PUBLISH_TARGET" >> "$GITHUB_OUTPUT"
          echo "publish_to_github=$PUBLISH_TO_GITHUB" >> "$GITHUB_OUTPUT"
          echo "publish_to_s3=$PUBLISH_TO_S3" >> "$GITHUB_OUTPUT"
          echo "mac_arch_matrix=$MAC_ARCH_MATRIX" >> "$GITHUB_OUTPUT"
          echo "mac_signing_enabled=$MAC_SIGNING_ENABLED" >> "$GITHUB_OUTPUT"
          echo "mac_notarization_enabled=$MAC_NOTARIZATION_ENABLED" >> "$GITHUB_OUTPUT"
          echo "s3_prefix=$NORMALIZED_S3_PREFIX" >> "$GITHUB_OUTPUT"

  build-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install app dependencies
        run: npx electron-builder install-app-deps

      - name: Build Windows installer
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            release/**/*.exe
          if-no-files-found: error
          retention-days: 30

  build-linux:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install app dependencies
        run: npx electron-builder install-app-deps

      - name: Build Linux installers
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-linux
          path: |
            release/**/*.AppImage
            release/**/*.deb
            release/**/*.zsync
          if-no-files-found: error
          retention-days: 30

  build-macos:
    needs: prepare
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJSON(needs.prepare.outputs.mac_arch_matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci

      - name: Install app dependencies
        run: npx electron-builder install-app-deps

      - name: Import code signing certificate
        if: ${{ needs.prepare.outputs.mac_signing_enabled == 'true' }}
        env:
          MAC_CERTIFICATE_P12: ${{ secrets.MAC_CERTIFICATE_P12 }}
          MAC_CERTIFICATE_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$MAC_CERTIFICATE_P12" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" \
            -k "$KEYCHAIN_PATH" \
            -P "$MAC_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          rm -f "$RUNNER_TEMP/certificate.p12"

      - name: Build renderer bundles
        run: npm run build-vite

      - name: Package macOS app bundle
        run: npx electron-builder --mac --${{ matrix.arch }} --dir
        env:
          CSC_NAME: ${{ secrets.MAC_CODESIGN_IDENTITY }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ needs.prepare.outputs.mac_signing_enabled == 'true' && 'true' || 'false' }}

      - name: Find .app bundle
        id: find_app
        run: |
          set -euo pipefail

          VERSION="${{ needs.prepare.outputs.version }}"
          APP_BUNDLE="$(find "release/${VERSION}" -maxdepth 4 -name "*.app" -type d | head -n1)"

          if [[ -z "$APP_BUNDLE" ]]; then
            echo "::error::No .app bundle found in release/${VERSION}/"
            exit 1
          fi

          echo "app_bundle=$APP_BUNDLE" >> "$GITHUB_OUTPUT"

      - name: Verify .app code signature
        if: ${{ needs.prepare.outputs.mac_signing_enabled == 'true' }}
        run: codesign --verify --deep --strict "${{ steps.find_app.outputs.app_bundle }}"

      - name: Create DMG
        id: dmg
        run: |
          set -euo pipefail

          VERSION="${{ needs.prepare.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          RELEASE_DIR="release/${VERSION}"
          SAFE_NAME="docsie-screen-recorder"
          DMG_NAME="${SAFE_NAME}-mac-${ARCH}-${VERSION}.dmg"
          DMG_OUTPUT="${RELEASE_DIR}/${DMG_NAME}"
          STAGING="${RELEASE_DIR}/dmg-staging-${ARCH}"

          rm -rf "$STAGING"
          rm -f "$DMG_OUTPUT"
          mkdir -p "$STAGING"

          cp -R "${{ steps.find_app.outputs.app_bundle }}" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"

          hdiutil create \
            -srcfolder "$STAGING" \
            -volname "Docsie Screen Recorder" \
            -fs HFS+ \
            -fsargs "-c c=64,a=16,e=16" \
            -format UDBZ \
            "$DMG_OUTPUT"

          rm -rf "$STAGING"

          echo "dmg_path=$DMG_OUTPUT" >> "$GITHUB_OUTPUT"
          echo "dmg_name=$DMG_NAME" >> "$GITHUB_OUTPUT"

      - name: Sign DMG
        if: ${{ needs.prepare.outputs.mac_signing_enabled == 'true' }}
        run: |
          codesign --force \
            --sign "${{ secrets.MAC_CODESIGN_IDENTITY }}" \
            --timestamp \
            "${{ steps.dmg.outputs.dmg_path }}"

      - name: Notarize DMG
        if: ${{ needs.prepare.outputs.mac_notarization_enabled == 'true' }}
        run: |
          xcrun notarytool submit "${{ steps.dmg.outputs.dmg_path }}" \
            --apple-id "${{ secrets.APPLE_ID }}" \
            --team-id "${{ secrets.APPLE_TEAM_ID }}" \
            --password "${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}" \
            --wait
        timeout-minutes: 20

      - name: Staple notarization ticket
        if: ${{ needs.prepare.outputs.mac_notarization_enabled == 'true' }}
        run: xcrun stapler staple "${{ steps.dmg.outputs.dmg_path }}"

      - name: Validate stapled DMG
        if: ${{ needs.prepare.outputs.mac_notarization_enabled == 'true' }}
        run: |
          xcrun stapler validate "${{ steps.dmg.outputs.dmg_path }}"
          spctl -a -vv -t install "${{ steps.dmg.outputs.dmg_path }}"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-${{ matrix.arch }}
          path: ${{ steps.dmg.outputs.dmg_path }}
          if-no-files-found: error
          retention-days: 30

      - name: Cleanup keychain
        if: ${{ always() && needs.prepare.outputs.mac_signing_enabled == 'true' }}
        run: security delete-keychain "$RUNNER_TEMP/build.keychain-db" || true

  publish:
    needs:
      - prepare
      - build-windows
      - build-linux
      - build-macos
    runs-on: ubuntu-latest
    if: ${{ needs.prepare.result == 'success' && needs.build-windows.result == 'success' && needs.build-linux.result == 'success' && needs.build-macos.result == 'success' && (needs.prepare.outputs.publish_to_github == 'true' || needs.prepare.outputs.publish_to_s3 == 'true') }}
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Show collected artifacts
        run: find release-assets -maxdepth 2 -type f | sort

      - name: Generate SHA256 checksums
        run: |
          set -euo pipefail
          cd release-assets
          find . -type f ! -name "SHA256SUMS.txt" -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Publish GitHub release
        if: ${{ needs.prepare.outputs.publish_to_github == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: Docsie Screen Recorder ${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ contains(needs.prepare.outputs.release_tag, '-') }}
          files: |
            release-assets/**
          fail_on_unmatched_files: true

      - name: Configure AWS credentials with OIDC
        if: ${{ needs.prepare.outputs.publish_to_s3 == 'true' && secrets.AWS_ROLE_TO_ASSUME != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}

      - name: Configure AWS credentials with static keys
        if: ${{ needs.prepare.outputs.publish_to_s3 == 'true' && secrets.AWS_ROLE_TO_ASSUME == '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION != '' && vars.AWS_REGION || 'us-east-1' }}

      - name: Upload assets to S3
        if: ${{ needs.prepare.outputs.publish_to_s3 == 'true' }}
        env:
          RELEASE_S3_BUCKET: ${{ vars.RELEASE_S3_BUCKET }}
          RELEASE_S3_PREFIX: ${{ needs.prepare.outputs.s3_prefix }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          set -euo pipefail

          DESTINATION="s3://${RELEASE_S3_BUCKET}/${RELEASE_TAG}/"
          if [[ -n "$RELEASE_S3_PREFIX" ]]; then
            DESTINATION="s3://${RELEASE_S3_BUCKET}/${RELEASE_S3_PREFIX}/${RELEASE_TAG}/"
          fi

          aws s3 cp release-assets "$DESTINATION" --recursive
